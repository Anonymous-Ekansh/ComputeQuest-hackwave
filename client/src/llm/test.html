<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebGPU TinyLlama Layer Test</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; line-height: 1.5; }
    .file-input { margin-bottom: 1rem; padding: 1rem; border: 1px solid #ccc; border-radius: 8px; }
    .file-input label { display: block; font-weight: bold; margin-bottom: 0.5rem; }
    button { padding: 0.5rem 1rem; font-size: 1.1rem; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>WebGPU Layer Verification</h1>
  <p>Select the files generated by <code>prepare_model.py</code> and <code>reference_check.py</code> to verify the WebGPU forward pass.</p>
  
  <div class="file-input">
    <label>1. manifest.json (from server/models/manifest.json)</label>
    <input type="file" id="file-manifest" accept=".json">
  </div>
  <div class="file-input">
    <label>2. layer_00.bin (from server/models/layers/layer_00.bin)</label>
    <input type="file" id="file-layer-bin" accept=".bin">
  </div>
  <div class="file-input">
    <label>3. layer_0_input.json (from reference_check.py)</label>
    <input type="file" id="file-layer-input" accept=".json">
  </div>
  <div class="file-input">
    <label>4. reference_output.json (from reference_check.py)</label>
    <input type="file" id="file-layer-output" accept=".json">
  </div>

  <button id="run-btn" disabled>Run Verification</button>
  
  <h3>Log</h3>
  <pre id="log-output">Waiting for files...</pre>

  <script type="module">
    import { loadLayerWeights, runDecoderLayer, readBuffer, uploadFloat32 } from './webgpu-kernels.js';

    const logEl = document.getElementById('log-output');
    function log(msg) {
      logEl.textContent += msg + '\n';
      console.log(msg);
    }

    const files = {
      manifest: null,
      layerBin: null,
      layerInput: null,
      layerOutput: null
    };

    function checkFiles() {
      const ready = files.manifest && files.layerBin && files.layerInput && files.layerOutput;
      document.getElementById('run-btn').disabled = !ready;
      if (ready) log("All files selected. Ready to run.");
    }

    document.getElementById('file-manifest').addEventListener('change', e => { files.manifest = e.target.files[0]; checkFiles(); });
    document.getElementById('file-layer-bin').addEventListener('change', e => { files.layerBin = e.target.files[0]; checkFiles(); });
    document.getElementById('file-layer-input').addEventListener('change', e => { files.layerInput = e.target.files[0]; checkFiles(); });
    document.getElementById('file-layer-output').addEventListener('change', e => { files.layerOutput = e.target.files[0]; checkFiles(); });

    async function readFileAsText(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsText(file);
      });
    }

    async function readFileAsArrayBuffer(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsArrayBuffer(file);
      });
    }

    document.getElementById('run-btn').addEventListener('click', async () => {
      try {
        logEl.textContent = "Starting verification...\n";
        document.getElementById('run-btn').disabled = true;

        if (!navigator.gpu) throw new Error("WebGPU not supported in this browser.");
        
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) throw new Error("No WebGPU adapter found.");
        const device = await adapter.requestDevice();
        log("✅ WebGPU device acquired.");

        // Read files
        log("Reading files...");
        const manifestText = await readFileAsText(files.manifest);
        const manifest = JSON.parse(manifestText);
        
        const binBuffer = await readFileAsArrayBuffer(files.layerBin);
        
        const inputText = await readFileAsText(files.layerInput);
        const inputData = JSON.parse(inputText);
        
        const outputText = await readFileAsText(files.layerOutput);
        const refOutputData = JSON.parse(outputText);

        // Find the right tensor entries in manifest (assuming layer 0)
        // reference_output specifies layer index
        const layerIdx = inputData.layer || 0;
        const layerManifest = manifest.files.find(f => f.layer_index === layerIdx);
        if (!layerManifest) throw new Error(`Could not find manifest entry for layer ${layerIdx}`);
        
        log(`Loading weights for layer ${layerIdx}...`);
        const weights = loadLayerWeights(device, binBuffer, layerManifest.tensors);
        log("✅ Weights loaded and dequantised.");

        // Upload input hidden state
        const seqLen = inputData.shape[0];
        const hiddenSize = inputData.shape[1];
        if (hiddenSize !== 2048) throw new Error(`Unexpected hidden size: ${hiddenSize}`);
        
        const inputArray = new Float32Array(inputData.hidden_states);
        const hBuf = uploadFloat32(device, inputArray);
        log(`✅ Uploaded input hidden state (${seqLen} x ${hiddenSize}).`);

        // Run the WebGPU layer
        log("Running forward pass...");
        const t0 = performance.now();
        const { hiddenStates: outBuf } = runDecoderLayer(device, weights, hBuf, seqLen, null, 0);
        // Wait for queue
        device.queue.submit([]); // Ensure previous submits are flushable
        const t1 = performance.now();
        log(`✅ Forward pass dispatched (took ${(t1-t0).toFixed(2)} ms setup).`);

        // Read back output
        log("Reading back results...");
        const outFloatCount = seqLen * hiddenSize;
        const outArray = await readBuffer(device, outBuf, outFloatCount);
        const t2 = performance.now();
        log(`✅ Results read back (took ${(t2-t1).toFixed(2)} ms read).`);

        // Compare
        const refArray = new Float32Array(refOutputData.hidden_states);
        if (outArray.length !== refArray.length) {
          throw new Error(`Size mismatch: out=${outArray.length}, ref=${refArray.length}`);
        }

        let maxDiff = 0;
        let meanDiff = 0;
        let maxIdx = -1;
        for (let i = 0; i < outArray.length; i++) {
          const diff = Math.abs(outArray[i] - refArray[i]);
          meanDiff += diff;
          if (diff > maxDiff) {
            maxDiff = diff;
            maxIdx = i;
          }
        }
        meanDiff /= outArray.length;

        log("\n--- Comparison Results ---");
        log(`Total elements: ${outArray.length}`);
        log(`Mean Abs Diff: ${meanDiff.toExponential(4)}`);
        log(`Max  Abs Diff: ${maxDiff.toExponential(4)}`);
        
        if (maxDiff < 1e-2) {
          log(`\n🎉 PASS! Max diff is well within 1e-2 tolerance.`);
        } else {
          log(`\n❌ FAIL! Max diff exceeds 1e-2 tolerance.`);
          log(`Worst offender at index ${maxIdx}: ref=${refArray[maxIdx]}, gpu=${outArray[maxIdx]}`);
        }

      } catch (err) {
        log(`\nERROR: ${err.message}`);
        console.error(err);
      } finally {
        checkFiles(); // re-enable button if files are still there
      }
    });
  </script>
</body>
</html>
